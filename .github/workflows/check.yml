name: check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  # Required so the called secrets-scan workflow can upload SARIF.
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    uses: rechenmaschine-playground/ci-templates/.github/workflows/secrets-scan.yml@b0ce7d6618b6c73bdd5bd714475d00f7e8c3b353 # v0.1.1
    secrets: inherit
