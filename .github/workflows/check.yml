name: check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  # Required so the called secrets-scan workflow can upload SARIF.
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    uses: rechenmaschine-playground/ci-templates/.github/workflows/secrets-scan.yml@6dc3293cb3f9018bba6b49ce79912bd512ec1c38 # v0.1.2
    secrets: inherit
