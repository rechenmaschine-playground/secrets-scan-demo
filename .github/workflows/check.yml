name: check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write    # gitleaks PR comments
  security-events: write  # SARIF → Code Scanning

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    uses: rechenmaschine-playground/ci-templates/.github/workflows/secrets-scan.yml@1f49b3bc2f8f1c4abb48da2baaabab39cf9a77c3 # v0.1.4
    secrets: inherit
