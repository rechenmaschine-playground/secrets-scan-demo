name: secrets-scan

on:
  push:
    branches: [main]
  pull_request:
  # Daily full-history scan against main as a safety net. Catches:
  # - Pre-existing leaks that were already in history when the workflow
  #   was added (gitleaks scans the full log on schedule events).
  # - Findings from gitleaks rule updates that catch previously-missed
  #   patterns.
  # 08:00 UTC chosen as off-peak for the team.
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: read
  pull-requests: write    # gitleaks PR comments
  security-events: write  # SARIF → Code Scanning

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    uses: rechenmaschine-playground/ci-templates/.github/workflows/secrets-scan.yml@9af95f776ffe387bf4729320fc2be36ab0772cab # v0.2.0
    secrets: inherit
